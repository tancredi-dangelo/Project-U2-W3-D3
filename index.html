<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Library Shop</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>

  <body class="bg-tertiary">
    <header
      class="container-flex d-flex align-items-center justify-content-between my-3 mx-5 rounded-2 bg-white"
      style="height: 100px"
    >
      <nav class="d-flex justify-content-evenly" style="width: 80%">
        <button
          class="btn btn-sm btn-success m-0 p-2"
          type="button"
          data-bs-toggle="offcanvas"
          data-bs-target="#offcanvasExample"
          aria-controls="offcanvasExample"
        >
          Open Cart
        </button>

        <div
          class="offcanvas offcanvas-start d-flex flex-column align-items-center justify-content-center"
          tabindex="-1"
          id="offcanvasExample"
          aria-labelledby="offcanvasExampleLabel"
        >
          <div
            class="container-fluid offcanvas-header d-flex align-items-center justify-content-between"
          >
            <h4 class="offcanvas-title" id="offcanvasExampleLabel">
              Your current cart:
            </h4>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="offcanvas"
              aria-label="Close"
            ></button>
          </div>
          <div
            class="offcanvas-body d-flex flex-column align-items-center justify-content-start"
          >
            <div>
              <ul id="cartList" class="p-0"></ul>
              <button id="clearCartButton" class="btn btn-danger my-2">
                Clear Cart
              </button>
              <button id="goCheckOut" class="btn btn-success my-2">
                Go To Checkout
              </button>
            </div>
          </div>
        </div>
        <h1 class="m-0 p-2" style="width: 70%">Browse Library</h1>
      </nav>
    </header>

    <main class="container-fluid p-0 mt-5">
      <section
        id="catalogueSection"
        class="container-fluid justify-content-center"
      >
        <div
          id="catalogueRow"
          class="row justify-content-center gap-2 p-1"
        ></div>
      </section>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
